<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>序列对齐比对</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="序列对齐工具">
        <header class="topbar">
          <div>
            <p class="eyebrow">Sequence Alignment</p>
            <h1>序列对齐比对</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span>总得分</span>
            <strong id="scoreValue">0</strong>
          </div>
        </header>

        <section class="sequence-panel" aria-label="输入序列">
          <div class="sequence-name-row">
            <label class="name-field">
              <span>主序列名称</span>
              <input id="mainName" type="text" value="主序列" />
            </label>
          </div>
          <label class="field main-field">
            <span>主序列</span>
            <textarea id="mainSequence" spellcheck="false" autocomplete="off">AGCTC</textarea>
          </label>

          <div class="comparison-header">
            <span>对比序列</span>
            <button id="addComparisonButton" type="button" class="icon-button" aria-label="增加对比序列">
              +
            </button>
          </div>
          <div id="comparisonList" class="comparison-list"></div>
        </section>

        <section class="controls" aria-label="比对参数">
          <label>
            <span>匹配</span>
            <input id="matchScore" type="number" value="2" step="1" />
          </label>
          <label>
            <span>错配</span>
            <input id="mismatchScore" type="number" value="-1" step="1" />
          </label>
          <label>
            <span>缺口</span>
            <input id="gapScore" type="number" value="-2" step="1" />
          </label>
          <button id="alignButton" type="button">对齐</button>
          <button id="exportWordButton" type="button" class="secondary">导出 Word</button>
        </section>

        <section class="results" aria-label="比对结果">
          <div class="summary">
            <div>
              <span>主序列长度</span>
              <strong id="mainLength">0</strong>
            </div>
            <div>
              <span>对比条数</span>
              <strong id="comparisonCount">0</strong>
            </div>
            <div>
              <span>差异总数</span>
              <strong id="differenceCount">0</strong>
            </div>
            <div>
              <span>平均相似度</span>
              <strong id="identityRate">0%</strong>
            </div>
          </div>

          <div class="alignment-board" id="alignmentBoard" aria-live="polite"></div>
          <div class="legend" id="legend" aria-label="图例"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
